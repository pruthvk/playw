<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résumé Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1410;
    --ink-light: #5c5046;
    --ink-faint: #9e9488;
    --cream: #f9f6f0;
    --cream-dark: #ede8df;
    --accent: #c0392b;
    --border: #d4cdc3;
    --panel: #ffffff;
    --shadow-lg: 0 8px 48px rgba(26,20,16,0.14);
    --header-h: 56px;
    --tabs-h: 48px;
  }

  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; font-size:14px; line-height:1.6; }

  /* ── HEADER ── */
  header { background:var(--ink); color:var(--cream); height:var(--header-h); padding:0 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 20px rgba(0,0,0,0.3); }
  .logo { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; display:flex; align-items:center; gap:8px; white-space:nowrap; }
  .logo span { font-style:italic; color:#c9a96e; }
  .logo-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; }
  .header-actions { display:flex; gap:8px; align-items:center; }
  .btn { padding:7px 14px; border-radius:4px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:all 0.2s; border:none; white-space:nowrap; display:inline-flex; align-items:center; gap:5px; }
  .btn-ghost { background:transparent; color:var(--cream); border:1px solid rgba(255,255,255,0.25); }
  .btn-ghost:hover { background:rgba(255,255,255,0.1); }
  .btn-primary { background:var(--accent); color:white; }
  .btn-primary:hover { background:#a93226; }
  .btn-docx { background:#2b5797; color:white; }
  .btn-docx:hover { background:#1e3f6f; }
  .btn-docx:disabled { background:#888; cursor:not-allowed; }
  .btn-label { display:inline; }

  /* ── MOBILE TABS ── */
  .mobile-tabs { display:none; position:sticky; top:var(--header-h); z-index:150; background:var(--ink); height:var(--tabs-h); border-top:1px solid rgba(255,255,255,0.08); }
  .mobile-tabs button { flex:1; background:none; border:none; color:rgba(255,255,255,0.5); font-family:'DM Mono',monospace; font-size:11px; letter-spacing:1.2px; text-transform:uppercase; cursor:pointer; height:100%; transition:all 0.2s; border-bottom:2px solid transparent; display:flex; align-items:center; justify-content:center; gap:6px; }
  .mobile-tabs button.active { color:white; border-bottom-color:var(--accent); }

  /* ── LAYOUT ── */
  .app { display:grid; grid-template-columns:420px 1fr; min-height:calc(100vh - var(--header-h)); }

  /* ── EDITOR ── */
  .editor { background:var(--panel); border-right:1px solid var(--border); overflow-y:auto; max-height:calc(100vh - var(--header-h)); position:sticky; top:var(--header-h); }
  .editor-section { border-bottom:1px solid var(--cream-dark); }
  .section-header { padding:15px 20px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; background:var(--cream); transition:background 0.15s; }
  .section-header:hover { background:var(--cream-dark); }
  .section-title { font-family:'DM Mono',monospace; font-size:11px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-light); display:flex; align-items:center; gap:8px; }
  .section-title::before { content:''; display:block; width:3px; height:14px; background:var(--accent); border-radius:2px; }
  .section-title.page2-marker::before { background:#2b5797; }
  .section-chevron { font-size:12px; color:var(--ink-faint); transition:transform 0.2s; }
  .section-chevron.open { transform:rotate(180deg); }
  .section-body { padding:18px 20px; display:flex; flex-direction:column; gap:13px; animation:slideDown 0.2s ease; }
  @keyframes slideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

  .template-bar { padding:12px 20px; background:#faf8f5; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .template-bar > label { font-size:11px; color:var(--ink-faint); white-space:nowrap; font-family:'DM Mono',monospace; letter-spacing:1px; }
  .template-pills { display:flex; gap:6px; flex-wrap:wrap; }
  .pill { padding:5px 12px; border-radius:20px; border:1px solid var(--border); font-size:12px; cursor:pointer; background:white; color:var(--ink-light); font-family:'DM Sans',sans-serif; transition:all 0.15s; }
  .pill.active { background:var(--ink); color:white; border-color:var(--ink); }
  .pill:hover:not(.active) { border-color:var(--ink-light); }

  /* Page 2 divider in editor */
  .page2-divider { margin:0; padding:10px 20px; background:#eef2f9; border-bottom:1px solid #c5d0e8; display:flex; align-items:center; gap:8px; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#2b5797; }
  .page2-divider::before { content:''; flex:1; height:1px; background:#c5d0e8; }
  .page2-divider::after  { content:''; flex:1; height:1px; background:#c5d0e8; }

  .field-row { display:flex; gap:10px; }
  .field { display:flex; flex-direction:column; gap:5px; flex:1; min-width:0; }
  label { font-size:11px; font-weight:500; letter-spacing:0.5px; color:var(--ink-faint); text-transform:uppercase; }
  input, textarea, select { font-family:'DM Sans',sans-serif; font-size:13.5px; color:var(--ink); background:var(--cream); border:1px solid var(--border); border-radius:4px; padding:9px 11px; transition:border-color 0.15s,box-shadow 0.15s; width:100%; resize:none; -webkit-appearance:none; }
  input:focus, textarea:focus, select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(192,57,43,0.1); background:white; }
  textarea { min-height:70px; line-height:1.5; }

  .entry-card { background:var(--cream); border:1px solid var(--border); border-radius:6px; padding:13px 14px; transition:border-color 0.15s; }
  .entry-card:hover { border-color:#bbb; }
  .entry-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:11px; }
  .entry-card-title { font-size:11px; font-weight:500; color:var(--ink-light); font-family:'DM Mono',monospace; letter-spacing:0.5px; }
  .btn-remove { background:none; border:none; color:var(--ink-faint); cursor:pointer; font-size:15px; padding:2px 5px; line-height:1; transition:color 0.15s; border-radius:3px; }
  .btn-remove:hover { color:var(--accent); background:rgba(192,57,43,0.07); }
  .btn-add { background:none; border:1.5px dashed var(--border); color:var(--ink-light); padding:10px; border-radius:5px; cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif; width:100%; transition:all 0.15s; display:flex; align-items:center; justify-content:center; gap:6px; }
  .btn-add:hover { border-color:var(--accent); color:var(--accent); background:rgba(192,57,43,0.04); }

  /* ── PREVIEW ── */
  .preview { background:#e8e4de; padding:32px 24px; overflow-y:auto; display:flex; flex-direction:column; align-items:center; gap:16px; }
  .preview-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#a09890; align-self:flex-start; }
  .resume-scaler { width:100%; display:flex; flex-direction:column; align-items:center; gap:20px; }

  /* ── RESUME PAPER ── */
  .resume { background:white; width:700px; min-height:900px; box-shadow:var(--shadow-lg); padding:60px 56px; font-family:'DM Sans',sans-serif; color:#1a1410; font-size:13px; line-height:1.6; transform-origin:top center; animation:fadeIn 0.3s ease; flex-shrink:0; }
  .resume.page2 { min-height:600px; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  /* Page 2 label */
  .page2-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#7a8aaa; align-self:flex-start; width:700px; padding-left:4px; transform-origin:top left; }

  /* ══ CLASSIC ══ */
  .tpl-classic .resume-name { font-family:'Playfair Display',serif; font-size:36px; font-weight:700; letter-spacing:-0.5px; line-height:1.1; margin-bottom:4px; }
  .tpl-classic .resume-title { font-size:13px; font-weight:300; color:#6b5f55; letter-spacing:1px; text-transform:uppercase; margin-bottom:14px; }
  .tpl-classic .resume-contact { display:flex; flex-wrap:wrap; gap:5px 16px; font-size:12px; color:#6b5f55; padding-bottom:18px; border-bottom:2px solid #1a1410; margin-bottom:22px; }
  .tpl-classic .resume-contact span { display:flex; align-items:center; gap:4px; }
  .tpl-classic .section-label { font-family:'Playfair Display',serif; font-size:15px; font-weight:600; border-bottom:1px solid #d4cdc3; padding-bottom:5px; margin:18px 0 12px; }
  .tpl-classic .entry { margin-bottom:13px; }
  .tpl-classic .entry-header { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .tpl-classic .entry-role { font-weight:600; font-size:13.5px; }
  .tpl-classic .entry-date { font-size:12px; color:#888; white-space:nowrap; flex-shrink:0; }
  .tpl-classic .entry-org { font-size:13px; color:#c0392b; font-style:italic; margin-bottom:4px; }
  .tpl-classic .entry-desc { font-size:12.5px; color:#444; }
  .tpl-classic .skills-list { display:flex; flex-wrap:wrap; gap:5px; }
  .tpl-classic .skill-tag { background:#f4f0ea; border:1px solid #d4cdc3; border-radius:3px; padding:3px 9px; font-size:12px; color:#4a3f36; }
  .tpl-classic .summary-text { font-size:13px; color:#4a3f36; font-style:italic; }
  .tpl-classic .project-title { font-weight:600; font-size:13.5px; margin-bottom:2px; }
  .tpl-classic .project-meta { font-size:12px; color:#888; margin-bottom:4px; }
  .tpl-classic .project-desc { font-size:12.5px; color:#444; margin-bottom:4px; }
  .tpl-classic .project-tags { display:flex; flex-wrap:wrap; gap:4px; }
  .tpl-classic .project-tag { background:#f4f0ea; border:1px solid #d4cdc3; border-radius:3px; padding:2px 7px; font-size:11px; color:#4a3f36; }
  .tpl-classic .project-link { font-size:12px; color:#c0392b; }

  /* ══ MODERN ══ */
  .tpl-modern { display:grid; grid-template-columns:190px 1fr; padding:0; }
  .tpl-modern .resume-sidebar { background:#1a1410; color:#f9f6f0; padding:40px 24px; min-height:100%; }
  .tpl-modern .resume-main { padding:40px 36px; }
  .tpl-modern .resume-name { font-family:'Playfair Display',serif; font-size:24px; font-weight:700; line-height:1.15; margin-bottom:4px; }
  .tpl-modern .resume-title { font-size:10px; letter-spacing:1.2px; text-transform:uppercase; color:#c9a96e; margin-bottom:24px; }
  .tpl-modern .sidebar-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1.8px; text-transform:uppercase; color:#c9a96e; margin:18px 0 8px; padding-bottom:5px; border-bottom:1px solid rgba(255,255,255,0.1); }
  .tpl-modern .contact-item { font-size:11.5px; color:#ccc; margin-bottom:5px; word-break:break-all; }
  .tpl-modern .skill-item { font-size:11.5px; color:#ddd; margin-bottom:4px; padding-left:10px; position:relative; }
  .tpl-modern .skill-item::before { content:'·'; position:absolute; left:0; color:#c9a96e; }
  .tpl-modern .section-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#c0392b; margin:18px 0 10px; }
  .tpl-modern .entry { margin-bottom:13px; }
  .tpl-modern .entry-header { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .tpl-modern .entry-role { font-weight:600; font-size:13px; }
  .tpl-modern .entry-date { font-size:11px; color:#aaa; white-space:nowrap; flex-shrink:0; }
  .tpl-modern .entry-org { font-size:12px; color:#888; margin-bottom:4px; }
  .tpl-modern .entry-desc { font-size:12px; color:#555; }
  .tpl-modern .summary-text { font-size:12.5px; color:#555; border-left:3px solid #c0392b; padding-left:11px; }
  .tpl-modern .project-title { font-weight:600; font-size:13px; margin-bottom:2px; }
  .tpl-modern .project-meta { font-size:11px; color:#aaa; margin-bottom:4px; }
  .tpl-modern .project-desc { font-size:12px; color:#555; margin-bottom:4px; }
  .tpl-modern .project-tags { display:flex; flex-wrap:wrap; gap:4px; }
  .tpl-modern .project-tag { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:3px; padding:2px 7px; font-size:11px; color:#ccc; }
  .tpl-modern .project-link { font-size:11px; color:#c9a96e; }

  /* ══ MINIMAL ══ */
  .tpl-minimal .resume-name { font-family:'DM Sans',sans-serif; font-size:30px; font-weight:300; letter-spacing:-1px; margin-bottom:2px; }
  .tpl-minimal .resume-title { font-size:13px; color:#999; margin-bottom:12px; }
  .tpl-minimal .resume-contact { display:flex; flex-wrap:wrap; gap:4px 14px; font-size:12px; color:#888; margin-bottom:28px; }
  .tpl-minimal .section-label { font-size:10px; font-weight:500; letter-spacing:2.5px; text-transform:uppercase; color:#999; margin:22px 0 10px; }
  .tpl-minimal .divider { height:1px; background:#eee; margin-bottom:10px; }
  .tpl-minimal .entry { display:grid; grid-template-columns:90px 1fr; gap:0 16px; margin-bottom:12px; }
  .tpl-minimal .entry-date { font-size:11px; color:#aaa; padding-top:2px; }
  .tpl-minimal .entry-role { font-weight:500; font-size:13px; }
  .tpl-minimal .entry-org { font-size:12px; color:#888; margin-bottom:3px; }
  .tpl-minimal .entry-desc { font-size:12px; color:#666; }
  .tpl-minimal .skills-list { display:flex; flex-wrap:wrap; gap:4px; }
  .tpl-minimal .skill-tag { border:1px solid #ddd; border-radius:2px; padding:2px 9px; font-size:12px; color:#666; }
  .tpl-minimal .summary-text { font-size:13px; color:#666; }
  .tpl-minimal .project-entry { display:grid; grid-template-columns:90px 1fr; gap:0 16px; margin-bottom:14px; }
  .tpl-minimal .project-title { font-weight:500; font-size:13px; margin-bottom:2px; }
  .tpl-minimal .project-meta { font-size:11px; color:#aaa; margin-bottom:3px; }
  .tpl-minimal .project-desc { font-size:12px; color:#666; margin-bottom:3px; }
  .tpl-minimal .project-tags { display:flex; flex-wrap:wrap; gap:4px; }
  .tpl-minimal .project-tag { border:1px solid #ddd; border-radius:2px; padding:2px 7px; font-size:11px; color:#888; }
  .tpl-minimal .project-link { font-size:11px; color:#666; }

  /* Toast notification */
  .toast { position:fixed; bottom:24px; right:24px; background:var(--ink); color:white; padding:12px 18px; border-radius:6px; font-size:13px; z-index:999; opacity:0; transform:translateY(8px); transition:all 0.25s; pointer-events:none; display:flex; align-items:center; gap:8px; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.error { background:#c0392b; }

  /* ── PRINT ── */
  @page { margin:0; size:A4; }
  @media print {
    header,.editor,.mobile-tabs,.preview-label,.page2-label { display:none !important; }
    .app { display:block; }
    .preview { padding:0; background:white; gap:0; }
    .resume-scaler { gap:0; }
    .resume { box-shadow:none; width:100%; padding:40px; transform:none !important; page-break-after:always; }
    .resume.page2 { page-break-after:auto; }
  }

  /* ── SCROLLBAR ── */
  .editor::-webkit-scrollbar { width:4px; }
  .editor::-webkit-scrollbar-track { background:var(--cream); }
  .editor::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* ── RESPONSIVE ── */
  @media (max-width:1024px) { .app { grid-template-columns:340px 1fr; } }

  @media (max-width:768px) {
    :root { --header-h:52px; --tabs-h:44px; }
    header { padding:0 14px; }
    .logo { font-size:18px; }
    .mobile-tabs { display:flex; }
    .app { display:block; min-height:auto; }
    .editor { position:static; max-height:none; border-right:none; border-bottom:1px solid var(--border); }
    .editor.tab-hidden { display:none; }
    .preview { padding:20px 12px 40px; min-height:calc(100vh - var(--header-h) - var(--tabs-h)); }
    .preview.tab-hidden { display:none; }
    .field-row { flex-direction:column; gap:10px; }
  }

  @media (max-width:480px) {
    .btn-label { display:none; }
    .btn { padding:7px 10px; }
    .section-body { padding:14px; }
    .section-header { padding:13px 14px; }
    .template-bar { padding:10px 14px; }
    .preview { padding:14px 8px 40px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span>Résumé</span> Studio<div class="logo-dot"></div></div>
  <div class="header-actions">
    <button class="btn btn-docx" id="docxBtn" onclick="exportDocx()">⬇ <span class="btn-label">Export .docx</span></button>
    <button class="btn btn-ghost" onclick="window.print()">⎙ <span class="btn-label">Print / PDF</span></button>
    <button class="btn btn-primary" onclick="clearAll()">✦ <span class="btn-label">New</span></button>
  </div>
</header>

<div class="mobile-tabs" id="mobileTabs">
  <button id="tabEdit" class="active" onclick="switchTab('edit')">✏ Edit</button>
  <button id="tabPreview" onclick="switchTab('preview')">👁 Preview</button>
</div>

<div class="app">
  <!-- ── EDITOR ── -->
  <div class="editor" id="editorPanel">

    <div class="template-bar">
      <label>Template</label>
      <div class="template-pills">
        <div class="pill active" onclick="setTemplate('classic',this)">Classic</div>
        <div class="pill" onclick="setTemplate('modern',this)">Modern</div>
        <div class="pill" onclick="setTemplate('minimal',this)">Minimal</div>
      </div>
    </div>

    <!-- Personal Info -->
    <div class="editor-section">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-title">Personal Info</div>
        <div class="section-chevron open">▾</div>
      </div>
      <div class="section-body">
        <div class="field-row">
          <div class="field"><label>First Name</label><input type="text" id="firstName" placeholder="Jane" oninput="render()" value="Jane"></div>
          <div class="field"><label>Last Name</label><input type="text" id="lastName" placeholder="Smith" oninput="render()" value="Smith"></div>
        </div>
        <div class="field"><label>Professional Title</label><input type="text" id="jobTitle" placeholder="Senior Product Designer" oninput="render()" value="Senior Product Designer"></div>
        <div class="field-row">
          <div class="field"><label>Email</label><input type="email" id="email" placeholder="jane@example.com" oninput="render()" value="jane@example.com"></div>
          <div class="field"><label>Phone</label><input type="tel" id="phone" placeholder="+1 (555) 000-0000" oninput="render()" value="+1 (555) 234-5678"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Location</label><input type="text" id="location" placeholder="New York, NY" oninput="render()" value="New York, NY"></div>
          <div class="field"><label>Website / LinkedIn</label><input type="text" id="website" placeholder="linkedin.com/in/jane" oninput="render()" value="linkedin.com/in/janesmith"></div>
        </div>
      </div>
    </div>

    <!-- Summary -->
    <div class="editor-section">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-title">Summary</div>
        <div class="section-chevron open">▾</div>
      </div>
      <div class="section-body">
        <div class="field"><label>Professional Summary</label>
          <textarea id="summary" placeholder="A brief statement about your career goals and expertise..." oninput="render()">Accomplished product designer with 8+ years crafting intuitive digital experiences at scale. Known for translating complex user needs into elegant, data-informed design solutions that drive business outcomes.</textarea>
        </div>
      </div>
    </div>

    <!-- Experience -->
    <div class="editor-section">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-title">Experience</div>
        <div class="section-chevron open">▾</div>
      </div>
      <div class="section-body" id="experienceList"></div>
    </div>

    <!-- Education -->
    <div class="editor-section">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-title">Education</div>
        <div class="section-chevron open">▾</div>
      </div>
      <div class="section-body" id="educationList"></div>
    </div>

    <!-- Skills -->
    <div class="editor-section">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-title">Skills</div>
        <div class="section-chevron open">▾</div>
      </div>
      <div class="section-body">
        <div class="field"><label>Skills (comma-separated)</label>
          <textarea id="skills" placeholder="Figma, Prototyping, User Research..." oninput="render()">Figma, Prototyping, User Research, Design Systems, Interaction Design, Accessibility, Agile, HTML/CSS</textarea>
        </div>
      </div>
    </div>

    <!-- PAGE 2 DIVIDER -->
    <div class="page2-divider">Page 2 — Projects</div>

    <!-- Projects -->
    <div class="editor-section">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-title page2-marker">Projects</div>
        <div class="section-chevron open">▾</div>
      </div>
      <div class="section-body" id="projectList"></div>
    </div>

  </div><!-- /editor -->

  <!-- ── PREVIEW ── -->
  <div class="preview" id="previewPanel">
    <div class="preview-label">Live Preview</div>
    <div class="resume-scaler" id="resumeScaler">

/* ── Mobile tabs ── */

  const tp=document.getElementById('tabPreview');
  if(tab==='edit'){

/* ── Scale resume ── */
function scaleResume() {
  const scaler=document.getElementById('resumeScaler');
  const r1=document.getElementById('resumePreview');
  const r2=document.getElementById('resumePreview2');
  const lbl=document.getElementById('page2Label');
  if(!scaler||!r1) return;
  const RESUME_W=700;
  const available=scaler.clientWidth;
  const scale = (available>0&&available<RESUME_W) ? available/RESUME_W : 1;
  [r1,r2].forEach(r=>{
    if(scale<1){
      r.style.transform=`scale(${scale})`;
      r.style.transformOrigin='top center';
    } else {
      r.style.transform=''; r.style.transformOrigin='';
    }
  });
  if(lbl&&scale<1) { lbl.style.transform=`scale(${scale})`; lbl.style.transformOrigin='top left'; lbl.style.width=(RESUME_W+'px'); }
  else if(lbl) { lbl.style.transform=''; lbl.style.width=''; }
  // Fix scaler height for scaled elements
  if(scale<1){
    const h1=r1.scrollHeight*scale;
    const h2=r2.style.display!=='none'?r2.scrollHeight*scale+28:0;
    scaler.style.height=(h1+h2+40)+'px';
  } else { scaler.style.height=''; }
}

/* ── Export DOCX via Anthropic API ── */
async function exportDocx() {
  const btn = document.getElementById('docxBtn');
  btn.disabled = true;
  btn.innerHTML = '⏳ <span class="btn-label">Generating…</span>';

  const name     = `${get('firstName')} ${get('lastName')}`.trim() || 'Your Name';
  const title    = get('jobTitle');
  const email    = get('email');
  const phone    = get('phone');
  const loc      = get('location');
  const website  = get('website');
  const summary  = get('summary');
  const skills   = get('skills');

  const resumeData = {
    name, title, email, phone, location: loc, website, summary, skills,
    experiences, educations, projects
  };

  const prompt = `You are a JavaScript code generator. Generate a complete Node.js script that creates a professional .docx resume using the 'docx' npm library (v8+).

The resume data is:
${JSON.stringify(resumeData, null, 2)}

Requirements:
- Use docx library imports: Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, AlignmentType, BorderStyle, WidthType, ShadingType, HeadingLevel, LevelFormat, PageBreak
- Page 1: Name (large bold, 32pt), title, contact info in one line, then Summary, Experience, Education, Skills sections
- Page 2 (separate page via PageBreak): Projects section with name, role, year, description, tech stack, and link for each project. Only include page 2 if there are projects.
- Use clean professional styling, Arial font, proper spacing
- For section labels use: bold, 12pt, all caps, with a bottom border paragraph style
- Skills as comma-separated text
- Tech stack tags as comma-separated text
- Output to: output_resume.docx
- Use: Packer.toBuffer(doc).then(buf => require('fs').writeFileSync('output_resume.docx', buf))
- Return ONLY the complete JavaScript code, no markdown, no explanation, no backticks.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    let code = data.content.map(c => c.type === 'text' ? c.text : '').join('').trim();
    // Strip any accidental markdown fences
    code = code.replace(/^```[a-z]*\n?/i,'').replace(/\n?```$/,'').trim();

    // Send to server-side execution endpoint isn't available in browser —
    // so we package the code + docx library and trigger a download via a Blob approach.
    // Since we can't run Node.js in the browser, we'll use docxjs via CDN instead.
    await generateDocxInBrowser(resumeData);

  } catch(err) {
    showToast('Export failed: ' + err.message, true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '⬇ <span class="btn-label">Export .docx</span>';
  }
}

/* ── Generate DOCX directly in browser using docx library ── */
async function generateDocxInBrowser(d) {
  // Dynamically load docx UMD build
  if (!window.docx) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  const {
    Document, Packer, Paragraph, TextRun, AlignmentType,
    BorderStyle, HeadingLevel, LevelFormat, PageBreak,
    TabStopType, TabStopPosition
  } = window.docx;

  const PT  = n => n * 20; // half-points to pt
  const DXA = n => n * 1440; // inches to DXA

  const ACCENT = 'C0392B';
  const DARK   = '1A1410';
  const GRAY   = '888888';

  // Helper: horizontal rule paragraph
  const hrPara = () => new Paragraph({
    border: { bottom: { style: BorderStyle.SINGLE, size: 6, color: DARK } },
    spacing: { after: 120 }
  });

  // Helper: section heading
  const sectionHead = (text) => new Paragraph({
    spacing: { before: 240, after: 80 },
    border: { bottom: { style: BorderStyle.SINGLE, size: 4, color: 'CCCCCC' } },
    children: [new TextRun({ text, bold: true, size: PT(12), font: 'Arial', allCaps: true, color: DARK })]
  });

  // Helper: build contact line
  const contactParts = [d.email, d.phone, d.location, d.website].filter(Boolean).join('  ·  ');

  const page1Children = [
    // Name
    new Paragraph({
      spacing: { after: 60 },
      children: [new TextRun({ text: d.name || 'Your Name', bold: true, size: PT(26), font: 'Playfair Display, Georgia, serif', color: DARK })]
    }),
    // Title
    ...(d.title ? [new Paragraph({
      spacing: { after: 100 },
      children: [new TextRun({ text: d.title, size: PT(11), font: 'Arial', color: '6B5F55', allCaps: true })]
    })] : []),
    // Contact
    ...(contactParts ? [new Paragraph({
      spacing: { after: 0 },
      children: [new TextRun({ text: contactParts, size: PT(10), font: 'Arial', color: GRAY })]
    })] : []),
    hrPara(),

    // Summary
    ...(d.summary ? [
      sectionHead('Profile'),
      new Paragraph({ spacing: { after: 160 }, children: [new TextRun({ text: d.summary, size: PT(10.5), font: 'Arial', color: '4A3F36', italics: true })] })
    ] : []),

    // Experience
    ...(d.experiences && d.experiences.length ? [
      sectionHead('Experience'),
      ...d.experiences.flatMap(e => [
        new Paragraph({
          spacing: { before: 120, after: 20 },
          children: [
            new TextRun({ text: e.role || 'Role', bold: true, size: PT(11), font: 'Arial', color: DARK }),
            new TextRun({ text: `\t${e.start}${e.end?' – '+e.end:''}`, size: PT(10), font: 'Arial', color: GRAY }),
          ],
          tabStops: [{ type: TabStopType.RIGHT, position: DXA(6.5) }]
        }),
        ...(e.org ? [new Paragraph({ spacing:{ after: 40 }, children: [new TextRun({ text: e.org, size: PT(10.5), font: 'Arial', color: ACCENT, italics: true })] })] : []),
        ...(e.desc ? [new Paragraph({ spacing:{ after: 80 }, children: [new TextRun({ text: e.desc, size: PT(10.5), font: 'Arial', color: '444444' })] })] : []),
      ])
    ] : []),

    // Education
    ...(d.educations && d.educations.length ? [
      sectionHead('Education'),
      ...d.educations.flatMap(e => [
        new Paragraph({
          spacing: { before: 100, after: 20 },
          children: [
            new TextRun({ text: e.degree || 'Degree', bold: true, size: PT(11), font: 'Arial', color: DARK }),
            new TextRun({ text: `\t${e.start}${e.end?' – '+e.end:''}`, size: PT(10), font: 'Arial', color: GRAY }),
          ],
          tabStops: [{ type: TabStopType.RIGHT, position: DXA(6.5) }]
        }),
        ...(e.school ? [new Paragraph({ spacing:{ after: 60 }, children: [new TextRun({ text: e.school, size: PT(10.5), font: 'Arial', color: ACCENT, italics: true })] })] : []),
      ])
    ] : []),

    // Skills
    ...(d.skills ? [
      sectionHead('Skills'),
      new Paragraph({ spacing: { after: 120 }, children: [new TextRun({ text: d.skills, size: PT(10.5), font: 'Arial', color: '4A3F36' })] })
    ] : []),
  ];

  const hasProjects = d.projects && d.projects.some(p => p.name || p.desc);

  // Page 2 — Projects
  const page2Children = hasProjects ? [
    new Paragraph({ children: [new PageBreak()] }),
    // Page 2 header: name + "Projects" subtitle
    new Paragraph({
      spacing: { after: 40 },
      children: [new TextRun({ text: d.name || 'Your Name', bold: true, size: PT(20), font: 'Georgia', color: DARK })]
    }),
    new Paragraph({
      spacing: { after: 0 },
      children: [new TextRun({ text: 'Projects & Portfolio', size: PT(10), font: 'Arial', color: GRAY, allCaps: true })]
    }),
    hrPara(),
    sectionHead('Projects'),
    ...d.projects.flatMap(p => [
      new Paragraph({
        spacing: { before: 160, after: 20 },
        children: [
          new TextRun({ text: p.name || 'Untitled', bold: true, size: PT(11.5), font: 'Arial', color: DARK }),
          ...(p.year ? [new TextRun({ text: `  —  ${p.year}`, size: PT(10), font: 'Arial', color: GRAY })] : []),
        ]
      }),
      ...(p.role ? [new Paragraph({ spacing:{ after: 30 }, children: [new TextRun({ text: p.role, size: PT(10.5), font: 'Arial', color: ACCENT, italics: true })] })] : []),
      ...(p.desc ? [new Paragraph({ spacing:{ after: 60 }, children: [new TextRun({ text: p.desc, size: PT(10.5), font: 'Arial', color: '444444' })] })] : []),
      ...(p.stack ? [new Paragraph({ spacing:{ after: 40 }, children: [new TextRun({ text: 'Tech: ', bold: true, size: PT(10), font: 'Arial', color: DARK }), new TextRun({ text: p.stack, size: PT(10), font: 'Arial', color: '666666' })] })] : []),
      ...(p.link ? [new Paragraph({ spacing:{ after: 100 }, children: [new TextRun({ text: '🔗 ', size: PT(10) }), new TextRun({ text: p.link, size: PT(10), font: 'Arial', color: ACCENT })] })] : []),
    ])
  ] : [];

  const doc = new Document({
    sections: [{
      properties: {
        page: {
          size: { width: 12240, height: 15840 },
          margin: { top: 1080, right: 1080, bottom: 1080, left: 1080 }
        }
      },
      children: [...page1Children, ...page2Children]
    }]
  });

  const buffer = await Packer.toBuffer(doc);
  const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${(d.name||'resume').replace(/\s+/g,'_')}_resume.docx`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Downloaded ' + a.download);
}

/* ── Clear ── */
function clearAll(){
  if(!confirm('Start a new resume? All current data will be cleared.')) return;
  ['firstName','lastName','jobTitle','email','phone','location','website','summary','skills']
    .forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  experiences=[]; educations=[]; projects=[];
  nextExpId=1; nextEduId=1; nextProjId=1;
  renderEditorExperiences(); renderEditorEducations(); renderEditorProjects(); render();
}

/* ── Init ── */
renderEditorExperiences();
renderEditorEducations();
renderEditorProjects();
render();
</script>
</body>
